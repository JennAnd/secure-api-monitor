<div class="login-page">
  <div class="login-shell">
    <div class="login-hero">
      <p class="eyebrow">Secure API Monitor</p>
      <h1>Monitor API traffic and security in one place</h1>
      <p class="hero-text">
        Sign in to review request activity, failed endpoints and detected security events.
      </p>
    </div>

    <mat-card class="login-card">
      <div class="form-header">
        <h2>Sign in</h2>
        <p class="form-subtitle">Access your monitoring dashboard.</p>
      </div>

      <p *ngIf="successMessage" class="success">🎉 {{ successMessage }}</p>

      <form (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput [(ngModel)]="username" name="username" autocomplete="username" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input
            matInput
            [(ngModel)]="password"
            name="password"
            [type]="showPassword ? 'text' : 'password'"
            autocomplete="current-password"
          />
          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="showPassword = !showPassword"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
          >
            <mat-icon>{{ showPassword ? 'visibility' : 'visibility_off' }}</mat-icon>
          </button>
        </mat-form-field>

        <button
          mat-raised-button
          color="primary"
          class="full-width"
          type="submit"
          [disabled]="isLoading"
        >
          {{ isLoading ? 'Logging in...' : 'Sign in' }}
        </button>

        <button
          mat-button
          class="full-width secondary-btn"
          type="button"
          (click)="goToRegister()"
          [disabled]="isLoading"
        >
          Create an account
        </button>
      </form>

      <p *ngIf="errorMessage" class="error">
        {{ errorMessage }}
      </p>
    </mat-card>
  </div>
</div>
