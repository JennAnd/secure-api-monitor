<div class="login-container">
  <mat-card class="login-card">
    <h2>Secure API Monitor</h2>
    <p class="subtitle">Monitor API traffic and security events</p>
    <p *ngIf="successMessage" class="success">🎉 {{ successMessage }}</p>
    <form (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Username</mat-label>
        <input matInput [(ngModel)]="username" name="username" autocomplete="username" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input
          matInput
          [(ngModel)]="password"
          name="password"
          [type]="showPassword ? 'text' : 'password'"
          autocomplete="current-password"
        />
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="showPassword = !showPassword"
          [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
        >
          <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>

      <button
        mat-raised-button
        color="primary"
        class="full-width"
        type="submit"
        [disabled]="isLoading"
      >
        {{ isLoading ? 'Logging in...' : 'Login' }}
      </button>

      <button
        mat-button
        class="full-width secondary-btn"
        type="button"
        (click)="goToRegister()"
        [disabled]="isLoading"
      >
        Don’t have an account? Register here
      </button>
    </form>

    <p *ngIf="errorMessage" class="error">
      {{ errorMessage }}
    </p>
  </mat-card>
</div>
