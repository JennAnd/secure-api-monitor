<div class="settings-wrapper">
  <h2>Settings</h2>

  <!-- Current session -->
  <div class="settings-card">
    <h3>Current session</h3>
    <p class="section-text">Your current authenticated session.</p>

    <p><strong>Signed in as:</strong> {{ username }}</p>
    <p><strong>Status:</strong> <span class="status"> Active</span></p>
  </div>

  <!-- Preferences -->
  <div class="settings-card">
    <h3>Preferences</h3>
    <p class="section-text">Control how often API Logs refresh automatically.</p>

    <label>
      <input type="checkbox" [(ngModel)]="autoRefresh" />
      Enable auto refresh
    </label>

    <label>
      Refresh interval (seconds):
      <select [(ngModel)]="refreshSeconds" [disabled]="!autoRefresh">
        <option [value]="5">5</option>
        <option [value]="10">10</option>
        <option [value]="30">30</option>
      </select>
    </label>

    <button (click)="save()" [disabled]="!hasChanges()">Save</button>

    <p class="save-message" *ngIf="saved">✓ Changes saved</p>
  </div>
</div>
