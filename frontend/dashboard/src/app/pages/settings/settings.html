<div class="settings-wrapper">
  <div class="settings-header">
    <h2>Settings</h2>
    <p class="settings-intro">
      Manage your current session and control how API log updates are handled.
    </p>
  </div>

  <div class="settings-section">
    <h3 class="section-heading">Session</h3>

    <div class="settings-card session-card">
      <div class="info-row">
        <span class="info-label">Signed in as</span>
        <span class="info-value">{{ username }}</span>
      </div>

      <div class="info-row">
        <span class="info-label">Status</span>
        <span class="status-badge">Active</span>
      </div>
    </div>
  </div>

  <div class="settings-section">
    <h3 class="section-heading">Preferences</h3>

    <div class="settings-card preferences-card">
      <p class="section-text">
        Choose whether API Logs should refresh automatically and how often updates should run.
      </p>

      <label class="checkbox-row">
        <input type="checkbox" [(ngModel)]="autoRefresh" />
        Enable auto refresh
      </label>

      <div class="field-row">
        <label for="refreshInterval" class="field-label">Refresh interval</label>

        <select id="refreshInterval" [(ngModel)]="refreshSeconds" [disabled]="!autoRefresh">
          <option [value]="5">5 seconds</option>
          <option [value]="10">10 seconds</option>
          <option [value]="30">30 seconds</option>
        </select>
      </div>

      <div class="settings-actions">
        <button (click)="save()" [disabled]="!hasChanges()">Save</button>

        <p class="save-message" *ngIf="saved">✓ Changes saved</p>
      </div>
    </div>
  </div>
</div>
