<div class="overview-wrapper">

    <h1>API Overview</h1>
    <p class="dashboard-intro">
      Monitor request volume, failed requests and endpoint activity across the monitored API.
    </p>
  </div>

  <div class="dashboard-status-row">
    <div class="status-item">
      <span class="status-dot success"></span>
      <span class="status-label">Healthy traffic</span>

    <div class="status-item">
      <span class="status-dot danger"></span>
      <span class="status-label">Critical issues</span>
    </div>

  <app-stats-charts></app-stats-charts>
</div>
